name: Cron — market sentiment snapshot

# Runs every 30 minutes (clock-aligned) and on manual dispatch.
# GitHub Actions schedule precision is best-effort; the Worker's ingest
# endpoint rounds to the 30-min slot and dedups via the D1 primary key,
# so drift is harmless.
on:
  schedule:
    - cron: '0,30 * * * *'
  workflow_dispatch:

concurrency:
  group: cron-snapshot
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run cron
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
          VIX_THRESHOLD: ${{ vars.VIX_THRESHOLD }}
          FG_THRESHOLD: ${{ vars.FG_THRESHOLD }}
          S5FI_THRESHOLD: ${{ vars.S5FI_THRESHOLD }}
          SP500_RED_DAYS_MIN: ${{ vars.SP500_RED_DAYS_MIN }}
        run: pnpm --filter @market-sentiment/cron run start
