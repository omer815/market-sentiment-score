name = "market-sentiment-api"
main = "src/worker.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# MVP trigger is on-demand via POST /api/snapshots/refresh (FR-018).
# No scheduled cron in MVP — US2 reintroduces automatic cadence.

# D1 database binding — create with: wrangler d1 create market-sentiment
# then paste the returned database_id below.
[[d1_databases]]
binding = "DB"
database_name = "market-sentiment"
database_id = "REPLACE_WITH_WRANGLER_D1_CREATE_OUTPUT"
migrations_dir = "src/storage/migrations"

# Default flag thresholds. Override per-environment via `wrangler secret put`
# if you want them hidden, otherwise they're plain vars.
[vars]
VIX_THRESHOLD = "30"
FG_THRESHOLD = "20"
S5FI_THRESHOLD = "20"
SP500_RED_DAYS_MIN = "3"

# TRADINGVIEW_SIDECAR_URL must be set via `wrangler secret put TRADINGVIEW_SIDECAR_URL`
# — it's the https://…vercel.app URL of the Vercel Node fn deployed from
# scripts/tradingview-sidecar/. The Worker calls `${URL}/fetch` from
# /api/snapshots/refresh.

# POST /api/snapshots/refresh is intentionally open — no auth. Writes are
# idempotent on `slot_ts` (D1 PK) and validated by Zod + CHECK constraints.
