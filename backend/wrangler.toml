name = "market-sentiment-api"
main = "src/worker.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# Cron triggers intentionally disabled. The 30-minute cadence runs as a
# GitHub Actions workflow (.github/workflows/cron.yml) which uses the
# TradingView npm package (Node-only) and POSTs to /api/cron/ingest.
# [triggers]
# crons = ["0,30 * * * *"]

# D1 database binding — create with: wrangler d1 create market-sentiment
# then paste the returned database_id below.
[[d1_databases]]
binding = "DB"
database_name = "market-sentiment"
database_id = "REPLACE_WITH_WRANGLER_D1_CREATE_OUTPUT"
migrations_dir = "src/storage/migrations"

# Default flag thresholds (override via `wrangler secret put` if you want
# them hidden, otherwise they're just plain vars).
[vars]
VIX_THRESHOLD = "30"
FG_THRESHOLD = "20"
S5FI_THRESHOLD = "20"
SP500_RED_DAYS_MIN = "3"

# POST /api/cron/ingest is intentionally open — no auth. Writes are
# idempotent on `slot_ts` (D1 PK) and validated by Zod + CHECK constraints.
